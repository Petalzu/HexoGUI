name: build-all-platforms

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub Release after build"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Tag name for manual release (e.g. v1.0.2)"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false
  ELECTRON_BUILDER_DISABLE_PUBLISH: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact_glob: dist/HexoGUI-*-x64.exe
          - os: ubuntu-latest
            script: build:linux
            artifact_glob: dist/HexoGUI-*-x86_64.AppImage
          - os: macos-latest
            script: build:mac
            artifact_glob: dist/HexoGUI-*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build icon and app
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.release_tag != '')

    steps:
      - name: Resolve release tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=${{ github.event.inputs.release_tag }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build release template
        id: tpl
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          echo "name=HexoGUI ${TAG}" >> "${GITHUB_OUTPUT}"
          {
            echo "body<<EOF"
            echo "## HexoGUI ${TAG}"
            echo ""
            echo "### Packages"
            echo "- Windows: \`HexoGUI-*-x64.exe\`"
            echo "- Linux: \`HexoGUI-*-x86_64.AppImage\`"
            echo "- macOS: \`HexoGUI-*-arm64.dmg\`"
            echo ""
            echo "### Notes"
            echo "- This release is automatically built by GitHub Actions."
            echo "- Icons are auto-generated from \`HexoGUI.png\` during the build pipeline."
            echo ""
            echo "Repository: https://github.com/${REPO}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tpl.outputs.name }}
          tag_name: ${{ steps.vars.outputs.tag }}
          body: ${{ steps.tpl.outputs.body }}
          generate_release_notes: false
          files: |
            release-assets/HexoGUI-*-x64.exe
            release-assets/HexoGUI-*-x86_64.AppImage
            release-assets/HexoGUI-*-arm64.dmg
